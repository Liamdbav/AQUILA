<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQUILA</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="main.js" defer></script>
  </head>
  <body>
    <div class="app">

      <header class="app-header">
        <span class="app-logo">⬡</span>
        <h1 class="app-title">AQUILA</h1>
        <span class="app-sub">Python → .exe protégé</span>
      </header>

      <!-- Drag & drop -->
      <section class="section">
        <div id="drop-zone" class="drop-zone">
          <div id="drop-idle" class="drop-idle">
            <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M12 16V8m0 0-3 3m3-3 3 3"/>
              <rect x="3" y="3" width="18" height="18" rx="3"/>
            </svg>
            <p class="drop-label">Glisser un fichier <code>.py</code> ou un dossier</p>
            <div class="drop-browse">
              <button id="btn-pick-file" class="btn-ghost">Fichier .py</button>
              <button id="btn-pick-folder" class="btn-ghost">Dossier</button>
            </div>
          </div>
          <div id="drop-result" class="drop-result hidden">
            <svg class="drop-icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M9 12l2 2 4-4"/>
              <rect x="3" y="3" width="18" height="18" rx="3"/>
            </svg>
            <div class="drop-info">
              <span id="drop-name" class="drop-name"></span>
              <span id="drop-type" class="drop-badge"></span>
            </div>
            <button id="btn-reset" class="btn-ghost">Changer</button>
          </div>
        </div>
      </section>

      <!-- Dossier de sortie -->
      <section class="section row-section">
        <button id="btn-output" class="btn-secondary">Choisir le dossier de sortie</button>
        <span id="output-path" class="path-display">—</span>
      </section>

      <!-- Action principale -->
      <section class="section">
        <button id="btn-run" class="btn-primary" disabled>Générer le .exe</button>
      </section>

      <!-- Zone de progression -->
      <section id="progress-section" class="section progress-section hidden">
        <div id="progress-log" class="progress-log"></div>
        <button id="btn-open-folder" class="btn-secondary hidden">Ouvrir le dossier</button>
      </section>

    </div>
  </body>
</html>
